<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Contact page for RT Clone Hub." />
    <title>Contact - RT Clone Hub</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/contact.css" />
  </head>
  <body class="text-slate-800">
    <header class="sticky top-0 z-50 border-b border-slate-200 bg-white/95">
      <nav
        class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3 sm:px-6"
        aria-label="Main navigation"
      >
        <a href="../index.html" class="text-xl font-bold tracking-wide text-orange-700"
          >RT Clone Hub</a
        >
        <button
          id="menuBtn"
          class="rounded-md border border-slate-300 px-3 py-1 text-sm font-semibold md:hidden"
          aria-label="Toggle menu"
        >
          Menu
        </button>
        <ul id="navMenu" class="hidden gap-6 text-sm font-semibold md:flex">
          <li><a href="../index.html" class="hover:text-orange-600">Home</a></li>
          <li><a href="clones.html" class="hover:text-orange-600">Clones</a></li>
          <li><a href="about.html" class="hover:text-orange-600">About</a></li>
          <li><a href="contact.html" class="text-orange-700">Contact</a></li>
        </ul>
      </nav>
      <ul
        id="mobileNav"
        class="hidden space-y-2 border-t border-slate-200 px-4 py-3 text-sm font-semibold md:hidden"
      >
        <li><a href="../index.html" class="block hover:text-orange-600">Home</a></li>
        <li><a href="clones.html" class="block hover:text-orange-600">Clones</a></li>
        <li><a href="about.html" class="block hover:text-orange-600">About</a></li>
        <li><a href="contact.html" class="block text-orange-700">Contact</a></li>
      </ul>
    </header>

    <main>
      <section class="contact-hero border-b border-slate-200">
        <div class="mx-auto max-w-6xl px-4 py-14 sm:px-6">
          <h1 class="mb-3 text-4xl font-extrabold text-slate-900 sm:text-5xl">Contact Me</h1>
          <p class="max-w-3xl text-slate-700">
            You can send feedback or project suggestions using this simple form.
          </p>
        </div>
      </section>

      <section class="mx-auto max-w-3xl px-4 py-14 sm:px-6">
        <form
          id="contactForm"
          class="space-y-4 rounded-xl border border-slate-200 bg-white p-6 shadow-sm"
        >
          <div>
            <label for="name" class="mb-1 block text-sm font-semibold">Name</label>
            <input
              id="name"
              name="name"
              type="text"
              class="w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-orange-500"
              required
            />
          </div>
          <div>
            <label for="email" class="mb-1 block text-sm font-semibold">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              class="w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-orange-500"
              required
            />
          </div>
          <div>
            <label for="message" class="mb-1 block text-sm font-semibold">Message</label>
            <textarea
              id="message"
              name="message"
              rows="5"
              class="w-full rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-orange-500"
              required
            ></textarea>
          </div>
          <button
            type="submit"
            class="rounded-md bg-orange-600 px-5 py-2 text-sm font-bold text-white hover:bg-orange-700"
          >
            Send Message
          </button>
          <p id="formStatus" class="text-sm"></p>
        </form>
      </section>
    </main>

    <footer class="border-t border-slate-200 bg-white">
      <div class="mx-auto max-w-6xl px-4 py-8 text-sm text-slate-500 sm:px-6">
        <p>RT Clone Hub - Contact page</p>
      </div>
    </footer>

    <script src="../assets/js/site.js"></script>
    <script src="../assets/js/contact.js"></script>
  </body>
</html>
